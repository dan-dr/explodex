<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explodex SDK Harness</title>
    <style>
      body {
        margin: 0;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        color: #ececec;
        background: #111;
        font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      aside {
        border-right: 1px solid #333;
        padding: 12px 0;
        background: #181818;
      }
      main {
        display: grid;
        grid-template-rows: 1fr auto;
        min-width: 0;
      }
      .thread {
        padding: 28px;
        overflow: auto;
      }
      .composer {
        margin: 20px;
        padding: 12px;
        border: 1px solid #333;
        border-radius: 16px;
        background: #1c1c1c;
      }
      textarea {
        width: 100%;
        min-height: 80px;
        box-sizing: border-box;
        border: 0;
        outline: 0;
        resize: vertical;
        color: inherit;
        background: transparent;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <aside aria-label="App sidebar">
      <div style="padding: 8px 16px; opacity: .7">Mock Codex sidebar</div>
    </aside>
    <main>
      <section class="thread">
        <h1>Mock Codex thread</h1>
        <p>This page exercises the SDK zones without launching Codex.</p>
      </section>
      <section class="composer">
        <div id="above-composer-portal" data-above-composer-portal></div>
        <textarea aria-label="Message Codex" placeholder="Ask Codex..."></textarea>
      </section>
    </main>
    <script src="../sdk/explodex-sdk.js"></script>
  </body>
</html>
